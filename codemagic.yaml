# Codemagic CI/CD — Build do CazéTV LiveZix (fork Moblin)
# Build unsigned (sem Apple Developer Program) — IPA será assinado pelo SideStore
# no iPhone com Apple ID grátis do usuário no momento da instalação.
#
# Free tier Codemagic: 500 min/mês em Mac M2. Suficiente pra 25-30 builds.
# Setup: https://codemagic.io/start/  → conecta este repo GitHub → build automático.

workflows:
  livezix-unsigned:
    name: CazéTV LiveZix — Build unsigned IPA
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      vars:
        XCODE_PROJECT: "Moblin.xcodeproj"
        XCODE_SCHEME: "Moblin"
        CONFIGURATION: "Release"
        BUILD_DIR: "$CM_BUILD_DIR/build"
      xcode: latest

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
        - pattern: master
          include: true

    scripts:
      - name: Mostrar versões do ambiente
        script: |
          set -e
          echo "=== Xcode ==="; xcodebuild -version
          echo "=== Swift ==="; swift --version
          echo "=== macOS ==="; sw_vers
          echo "=== Diretório ==="; pwd; ls -la

      - name: Confirmar pasta LiveZix presente (filesystem-synchronized group)
        script: |
          set -e
          # Moblin usa PBXFileSystemSynchronizedRootGroup (Xcode 16+).
          # Qualquer arquivo .swift dentro de Moblin/ é AUTOMATICAMENTE adicionado ao
          # target Moblin durante o build. Só confirma que os 5 arquivos LiveZix estão lá.
          ls -la Moblin/LiveZix/
          if [ ! -f Moblin/LiveZix/LiveZixOnboardingView.swift ]; then
            echo "ERRO: Moblin/LiveZix/ não tem os arquivos esperados!"
            exit 1
          fi
          echo "OK — Xcode vai sincronizar automaticamente os 5 arquivos LiveZix."

      - name: Resolver dependências SPM
        script: |
          set -e
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME"

      - name: Preparar User.xcconfig (signing automático Personal Team)
        script: |
          set -e
          # Codemagic não tem Apple ID local — usamos build unsigned (SideStore re-assina).
          # User.xcconfig precisa existir senão Base.xcconfig quebra (include obrigatório).
          if [ ! -f User.xcconfig ]; then
            cp User.template.xcconfig User.xcconfig
          fi
          cat User.xcconfig

      - name: Archive unsigned (lida com extensions sem colisão)
        script: |
          set -e
          mkdir -p "$BUILD_DIR"
          ARCHIVE_PATH="$BUILD_DIR/Moblin.xcarchive"
          # xcodebuild archive empacota .app + Watch + Widgets/Extensions corretamente,
          # diferente de "build" que dá colisão de output entre Moblin e MoblinWatch.
          # Build unsigned — SideStore re-assina no iPhone com Apple ID grátis.
          xcodebuild archive \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            -derivedDataPath "$BUILD_DIR/derived" \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Empacotar .xcarchive em .ipa (formato Payload/)
        script: |
          set -e
          ARCHIVE_APP="$BUILD_DIR/Moblin.xcarchive/Products/Applications/Moblin.app"
          if [ ! -d "$ARCHIVE_APP" ]; then
            echo "ERRO: $ARCHIVE_APP não encontrado. Lista do xcarchive:"
            find "$BUILD_DIR/Moblin.xcarchive" -type d -name "*.app" || true
            exit 1
          fi
          STAGE="$CM_BUILD_DIR/ipa-stage"
          rm -rf "$STAGE"
          mkdir -p "$STAGE/Payload"
          cp -R "$ARCHIVE_APP" "$STAGE/Payload/"
          # Remove _CodeSignature/ pra ficar realmente unsigned (SideStore vai re-assinar)
          find "$STAGE/Payload/Moblin.app" -name "_CodeSignature" -type d -exec rm -rf {} + 2>/dev/null || true
          cd "$STAGE"
          zip -qry "$CM_BUILD_DIR/CazeTV-LiveZix-unsigned.ipa" Payload
          echo "=== IPA gerado ==="
          ls -lh "$CM_BUILD_DIR/CazeTV-LiveZix-unsigned.ipa"
          # Resumo do bundle pra confirmar branding CazéTV
          /usr/libexec/PlistBuddy -c "Print :CFBundleDisplayName" "$STAGE/Payload/Moblin.app/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Print :CFBundleName" "$STAGE/Payload/Moblin.app/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$STAGE/Payload/Moblin.app/Info.plist" || true

    artifacts:
      - CazeTV-LiveZix-unsigned.ipa
      - $BUILD_DIR/Build/Products/Release-iphoneos/Moblin.app
      # Logs de erro do Xcode em caso de falha
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          # Coloque seu email aqui pra receber notif quando build terminar
          - boliva@livemode.com
        notify:
          success: true
          failure: true
